<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>[정보관리기술사] 1교시 토픽 통합 — SW공학·SW운영·정보화전략·DB·네트워크·컴퓨터구조/OS</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<header class="appbar">
  <div class="topbar">
    <div class="brand">🎓 정보관리기술사<small>1교시 토픽 통합</small></div>
    <input id="globalSearch" class="gsearch" type="text" placeholder="🔍 전 과목 통합 검색 — 토픽·키워드" />
    <div class="viewsw" id="viewsw">
      <button data-v="cards" class="active">🗂 카드</button>
      <button data-v="graph">🗺 관계도</button>
      <button data-v="sheet">📋 정의 시트</button>
    </div>
    <span class="count" id="count"></span>
  </div>
  <div class="facets">
    <div class="facet-row" id="domFacet" aria-label="과목 필터"></div>
    <div class="facet-row" id="secFacet" aria-label="단원 필터"></div>
  </div>
</header>

<div id="content"></div>

<div id="graph" class="hidden">
  <div class="graph-tools">
    <button onclick="GSGraph.expandAll()">전체 펼치기</button>
    <button onclick="GSGraph.collapseAll()">전체 접기</button>
    <button onclick="GSGraph.fit()">화면 맞춤</button>
    <span class="tool-hint">노드 클릭 — 단원: 토픽 펼치기/접기 · 토픽: 카드로 이동 · 휠 확대 · 드래그 이동</span>
  </div>
  <div id="graphCanvas"></div>
</div>

<div id="sheet" class="hidden">
  <div class="sheet-tools">
    <label><input type="checkbox" id="maskDef" /> 정의 가리기 — 행 클릭해 확인(암기 모드)</label>
    <span class="tool-hint">전 토픽 정의문 모음 · 상단 검색·과목/단원 필터 적용</span>
  </div>
  <div id="sheetBody"></div>
</div>

<footer>
  기술사 1교시 3단 골격(정의 → 구성도 → 구성요소) · 전 과목 통합 검색 + 과목·단원 필터<br/>
  데이터: <code>data/*.json</code> 분리 (수정: JSON 편집 후 <code>python build.py</code> 재실행) · 자세한 구조는 <code>AGENTS.md</code>
</footer>

<script src="assets/render.js"></script>
<script src="data/bundle.js"></script>
<script src="assets/graph.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
